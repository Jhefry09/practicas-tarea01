name: Notificar commits al backend

on:
  push:
    branches:
      - main        # ajusta según tus ramas
      - develop

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Enviar commit al backend
        env:
          BACKEND_TOKEN: ${{ secrets.BACKEND_TOKEN }}
        run: |
          curl -s -X POST https://cabanillas.net.pe/api/commits \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $BACKEND_TOKEN" \
            -d "{
              \"usuario\": \"${{ github.actor }}\",
              \"repo\": \"${{ github.repository }}\",
              \"rama\": \"${{ github.ref_name }}\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"mensaje\": \"${{ github.event.head_commit.message }}\",
              \"timestamp\": \"${{ github.event.head_commit.timestamp }}\"
            }"
